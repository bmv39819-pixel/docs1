<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="800" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
  <!-- Основа страницы (прямоугольник с закруглёнными углами) -->
  <rect x="20" y="10" width="60" height="70" rx="2" ry="2" fill="none" stroke="#ffffff" stroke-width="8"/>
  
  <!-- Горизонтальные линии, имитирующие текст -->
  <line x1="30" y1="30" x2="60" y2="30" stroke="#ffffff" stroke-width="8"/>
  <line x1="30" y1="40" x2="70" y2="40" stroke="#ffffff" stroke-width="8"/>
  <line x1="30" y1="50" x2="50" y2="50" stroke="#ffffff" stroke-width="8"/>
</svg>